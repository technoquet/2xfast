<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found – MyFlixer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/myflixer.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/myflixer.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/myflixer.jpg">
    <meta name="description" content="Oops! The page you are looking for cannot be found on MyFlixer." />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style type="text/css">
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            color: #222;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background: #fff;
            border-bottom: 1px solid #e6e6e6;
        }

        .logo-text {
            color: #1a73e8;
            font-weight: 700;
            text-decoration: none;
        }

        .logo-text:hover {
            color: #1557b0;
            text-decoration: none;
        }

        .hero-404 {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 70px 20px;
        }

        .hero-404 h1 {
            font-size: 100px;
            font-weight: 700;
            color: #1a73e8;
        }

        .hero-404 h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .btn-main {
            background: #1a73e8;
            color: #fff;
            padding: 12px 26px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: #1557b0;
            color: #fff;
        }

        footer {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e6e6e6;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container">
            <a href="/" class="logo-text h4 m-0">MyFlixer</a>
        </div>
    </nav>

    <section class="hero-404">
        <h1>404</h1>
        <h3>Oops! Page Not Found</h3>
        <p>The page you are looking for doesn’t exist or has been moved.</p>
        <a href="/" class="btn-main"><i class="fas fa-home"></i> Go Back Home</a>
    </section>

    <footer>
        © 2026 <strong>MyFlixer</strong> | All Rights Reserved
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
